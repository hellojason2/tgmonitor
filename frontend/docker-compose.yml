version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - tgmonitor_net

networks:
  tgmonitor_net:
    external: true
