services:
  postgres:
    image: postgres:16-alpine
    container_name: tgmonitor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgmonitor
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: tgmonitor
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tgmonitor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tgmonitor_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://tgmonitor:${POSTGRES_PASSWORD}@postgres:5432/tgmonitor"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      API_SECRET_KEY: "${API_SECRET_KEY}"
      SCREENSHOT_DIR: /var/data/screenshots
    volumes:
      - ./data/screenshots:/var/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tgmonitor_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tgmonitor_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8000"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - tgmonitor_net

  nginx:
    image: nginx:alpine
    container_name: tgmonitor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cert.pem:/etc/nginx/cert.pem:ro
      - ./nginx/key.pem:/etc/nginx/key.pem:ro
      - ./data/screenshots:/var/data/screenshots:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tgmonitor_net

networks:
  tgmonitor_net:
    driver: bridge
