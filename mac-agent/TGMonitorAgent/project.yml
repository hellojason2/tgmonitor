name: TGMonitorAgent
options:
  bundleIdPrefix: com.jsr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  TGMonitorAgent:
    type: application
    platform: macOS
    sources:
      - Sources/App
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jsr.systemhelper
        SWIFT_ENABLE_MACROS: YES
        PRODUCT_NAME: TGMonitorAgent
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/TGMonitorAgent.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Resources/TGMonitorAgent.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.screen-recording: true
