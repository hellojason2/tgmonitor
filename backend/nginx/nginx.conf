events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css image/jpeg image/jpg;

    # Client settings
    client_max_body_size 20M;
    client_body_timeout 60s;

    # Upstream
    upstream backend {
        server backend:8000;
    }

    # HTTP -> HTTPS redirect (no HTTPS in dev; just serve on 80)
    server {
        listen 80;
        server_name _;

        # Redirect all HTTP to HTTPS (for when certs are configured)
        # In dev/test, uncomment the following:
        # return 301 https://$host$request_uri;
    }

    # Main server (HTTPS with self-signed cert)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;

        # API proxy
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Static screenshot files
        location /screenshots/ {
            alias /var/data/screenshots/;
            autoindex off;

            # Cache images for 1 day
            add_header Cache-Control "public, max-age=86400";

            # Set correct content type for jpegs
            location ~* \.jpg$ {
                add_header Content-Type image/jpeg;
            }
            location ~* \.thumb\.jpg$ {
                add_header Content-Type image/jpeg;
            }
        }

        # Health check endpoint (no auth required)
        location /api/v1/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /api/v1/ready {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}
